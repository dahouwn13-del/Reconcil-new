using CIEL.Reconciliation.Models;

namespace CIEL.Reconciliation.Security;

public static class AppServices
{
    public static UserStore Users { get; } = new();
}

public static class CurrentSession
{
    public static AppUser? User { get; set; }
    public static string Username => User?.Username ?? "system";
    public static bool IsAdministrator => User?.IsAdministrator == true;
}
